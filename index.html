<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitung Hari ke Hari Ini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">

  <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md transition-all duration-500">

    <h1 class="text-2xl font-bold mb-6 text-center">
      📆 Hitung Hari ke Hari Ini
    </h1>

    <label class="block mb-2 text-sm">Pilih Tanggal</label>
    <input id="startDate"
           type="date"
           class="w-full p-3 rounded-lg bg-slate-800 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"/>

    <button onclick="calculateDiff()"
            class="w-full bg-blue-600 hover:bg-blue-700 transition-all p-3 rounded-lg font-semibold mb-4">
      Hitung Jumlah Hari ke Hari Ini
    </button>

    <div class="rounded-xl border border-blue-400/30 bg-blue-500/10 p-4 mb-6">
      <p class="text-xs uppercase tracking-wide text-blue-200 mb-1">Hasil Perhitungan</p>
      <div id="resultDiff"
           class="text-lg font-semibold transition-all duration-500">
        <span class="text-slate-300">Belum dihitung.</span>
      </div>
    </div>

    <label class="block mb-2 text-sm">Tambah Hari</label>
    <input id="addDays"
           type="number"
           value="90"
           min="0"
           class="w-full p-3 rounded-lg bg-slate-800 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-green-500 mb-4"/>

    <button onclick="calculateAdd()"
            class="w-full bg-green-600 hover:bg-green-700 transition-all p-3 rounded-lg font-semibold mb-4">
      Hitung Tanggal + Hari
    </button>

    <div class="rounded-xl border border-green-400/30 bg-green-500/10 p-4">
      <p class="text-xs uppercase tracking-wide text-green-200 mb-1">Hasil Tambah Hari</p>
      <div id="resultAdd"
           class="text-lg font-semibold transition-all duration-500">
        <span class="text-slate-300">Belum dihitung.</span>
      </div>
    </div>

  </div>

<script>
function parseLocalDate(value) {
  const [year, month, day] = value.split("-").map(Number);
  return new Date(year, month - 1, day);
}

function formatLocalDate(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function dayDiffToToday(start, today) {
  const utcStart = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
  const utcToday = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.trunc((utcToday - utcStart) / (1000 * 60 * 60 * 24));
}

function calculateDiff() {
  const input = document.getElementById("startDate").value;
  if (!input) {
    document.getElementById("resultDiff").innerHTML =
      '<span class="text-yellow-300">Pilih tanggal awal terlebih dahulu.</span>';
    return;
  }

  const start = parseLocalDate(input);
  const today = new Date();

  const diffDays = dayDiffToToday(start, today);

  const detail = diffDays >= 0 ? "sejak" : "menuju";
  const absoluteDays = Math.abs(diffDays);

  document.getElementById("resultDiff").innerHTML =
    `📊 Dari <span class="text-blue-300">${formatLocalDate(start)}</span> ke hari ini <span class="text-blue-300">${formatLocalDate(today)}</span>: <span class="text-blue-300">${absoluteDays} hari</span> ${detail} tanggal awal`;
}

function calculateAdd() {
  const input = document.getElementById("startDate").value;
  const add = parseInt(document.getElementById("addDays").value, 10);

  if (!input) {
    document.getElementById("resultAdd").innerHTML =
      '<span class="text-yellow-300">Pilih tanggal terlebih dahulu.</span>';
    return;
  }

  if (isNaN(add) || add < 0) {
    document.getElementById("resultAdd").innerHTML =
      '<span class="text-yellow-300">Masukkan jumlah hari yang valid (>= 0).</span>';
    return;
  }

  const start = parseLocalDate(input);
  const target = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  target.setDate(target.getDate() + add);

  document.getElementById("resultAdd").innerHTML =
    `🎯 <span class="text-green-300">${formatLocalDate(start)}</span> + <span class="text-green-300">${add} hari</span> = <span class="text-green-300">${formatLocalDate(target)}</span>`;
}

document.getElementById("startDate").addEventListener("change", () => {
  calculateDiff();
  calculateAdd();
});

document.getElementById("addDays").addEventListener("input", () => {
  const hasDate = document.getElementById("startDate").value !== "";
  if (hasDate) calculateAdd();
});
</script>

</body>
</html>
